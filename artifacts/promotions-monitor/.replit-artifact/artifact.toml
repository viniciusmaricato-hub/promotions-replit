kind = "web"
previewPath = "/"
title = "Promotions Monitor"
version = "1.0.0"
id = "artifacts/promotions-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24967

[services.development]
run = "pnpm --filter @workspace/promotions-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/promotions-monitor", "run", "build" ]
publicDir = "artifacts/promotions-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24967"
BASE_PATH = "/"
